<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Restaurant Menu | MiniFoodXpress</title>

<link rel="stylesheet" href="../shared/css/main.css">

<style>

body{
font-family:Arial,sans-serif;
margin:0;
background:#f5f5f5;
}

header{
background:#ff4d4f;
color:white;
padding:15px;
}

.container{
padding:20px;
}

.menu-item{
background:white;
padding:15px;
margin-bottom:12px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

button{
padding:8px 12px;
border:none;
border-radius:4px;
cursor:pointer;
background:#28a745;
color:white;
margin-top:8px;
}

.cart-btn{
background:#007bff;
margin-top:20px;
}

</style>

</head>

<body>

<header>

<a href="home.html" style="color:white;text-decoration:none">← Restaurants</a>

<h3>Menu</h3>

</header>

<div class="container" id="menuContainer">

Loading menu...

</div>

<div class="container">

<a href="cart.html">

<button class="cart-btn">Open Cart</button>

</a>

</div>

<script type="module">

import { supabase } from "../shared/js/supabase-client.js"

const params = new URLSearchParams(window.location.search)
const restaurantId = params.get("id")

const container = document.getElementById("menuContainer")

let cart = JSON.parse(localStorage.getItem("cart") || "[]")

async function loadMenu(){

const { data, error } = await supabase
.from("menu_items")
.select("*")
.eq("restaurant_id",restaurantId)

if(error){
container.innerHTML="Menu loading error"
return
}

container.innerHTML=""

if(!data || data.length===0){
container.innerHTML="Menu empty"
return
}

data.forEach(item=>{

const div = document.createElement("div")

div.className="menu-item"

div.innerHTML = `

<h3>${item.name}</h3>

<p>₹${item.price}</p>

<button onclick="addToCart('${item.id}','${item.name}',${item.price})">

Add to Cart

</button>

`

container.appendChild(div)

})

}

window.addToCart = function(id,name,price){

cart.push({
id,
name,
price,
qty:1
})

localStorage.setItem("cart",JSON.stringify(cart))

alert("Added to cart")

}

loadMenu()

</script>

</body>

</html>
