<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout | MiniFoodXpress</title>

<link rel="stylesheet" href="../shared/css/main.css">

<style>

body{
font-family:Arial,sans-serif;
margin:0;
background:#f5f5f5;
}

header{
background:#ff4d4f;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.checkout-container{
padding:20px;
}

.section{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

input,textarea{
width:100%;
padding:10px;
margin-top:8px;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:12px;
width:100%;
background:#28a745;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.total{
font-weight:bold;
margin-top:10px;
}

</style>

</head>

<body>

<header>

<a href="cart.html" style="color:white;text-decoration:none">← Back</a>

<h3>Checkout</h3>

<span></span>

</header>

<div class="checkout-container">

<div class="section">

<h4>Delivery Address</h4>

<textarea id="address" placeholder="Enter delivery address"></textarea>

</div>

<div class="section">

<h4>Order Summary</h4>

<div id="orderItems"></div>

<p class="total" id="orderTotal">Total: ₹0</p>

</div>

<div class="section">

<button id="placeOrderBtn">Place Order</button>

</div>

</div>

<script type="module">

import { createOrder } from "../shared/js/api.js"

let cart = JSON.parse(localStorage.getItem("cart") || "[]")

const orderItemsDiv = document.getElementById("orderItems")

let total = 0

cart.forEach(item => {

total += Number(item.price)

const p = document.createElement("p")

p.innerText = item.name + " - ₹" + item.price

orderItemsDiv.appendChild(p)

})

document.getElementById("orderTotal").innerText = "Total: ₹" + total

document.getElementById("placeOrderBtn").onclick = async () => {

const address = document.getElementById("address").value

if(!address){

alert("Please enter delivery address")

return

}

const orderData = {

address: address,
items: cart,
total_amount: total,
status: "pending"

}

const { data, error } = await createOrder(orderData)

if(error){

alert(error.message)
return

}

localStorage.removeItem("cart")

alert("Order placed successfully!")

window.location.href="orders-history.html"

}

</script>

</body>

</html>
