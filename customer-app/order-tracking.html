<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Track Order | MiniFoodXpress</title>

<link rel="stylesheet" href="../shared/css/main.css">

<style>

body{
font-family:Arial,sans-serif;
margin:0;
background:#f5f5f5;
}

header{
background:#ff4d4f;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.status{
margin-top:10px;
font-weight:bold;
font-size:18px;
}

.timeline{
margin-top:20px;
}

.timeline div{
margin-bottom:10px;
padding:10px;
background:#f0f0f0;
border-radius:5px;
}

.active{
background:#d4edda !important;
}

</style>

</head>

<body>

<header>

<a href="orders-history.html" style="color:white;text-decoration:none">← Orders</a>

<h3>Order Tracking</h3>

<span></span>

</header>

<div class="container">

<div class="card">

<h3 id="orderId">Order</h3>

<p id="orderAmount"></p>

<p class="status" id="orderStatus"></p>

<div class="timeline" id="timeline"></div>

</div>

</div>

<script type="module">

import { supabase } from "../shared/js/supabase-client.js"

const urlParams = new URLSearchParams(window.location.search)
const orderId = urlParams.get("id")

const orderStatusEl = document.getElementById("orderStatus")
const orderAmountEl = document.getElementById("orderAmount")
const orderIdEl = document.getElementById("orderId")
const timeline = document.getElementById("timeline")

const steps = [
"pending",
"accepted",
"preparing",
"ready",
"picked_up",
"out_for_delivery",
"delivered"
]

async function loadOrder(){

const { data, error } = await supabase
.from("orders")
.select("*")
.eq("id",orderId)
.single()

if(error){
console.error(error)
return
}

renderOrder(data)

}

function renderOrder(order){

orderIdEl.innerText="Order #"+order.id
orderAmountEl.innerText="Total: ₹"+order.total_amount
orderStatusEl.innerText="Status: "+order.status

timeline.innerHTML=""

steps.forEach(step=>{

const div=document.createElement("div")
div.innerText=step

if(step===order.status){
div.classList.add("active")
}

timeline.appendChild(div)

})

}

/* realtime tracking */

const channel = supabase
.channel("order-tracking")

.on(
"postgres_changes",
{
event:"UPDATE",
schema:"public",
table:"orders"
},
(payload)=>{

const updated = payload.new

if(updated.id === orderId){

console.log("Order update:", updated.status)

renderOrder(updated)

}

}
)

.subscribe()

loadOrder()

</script>

</body>

</html>
