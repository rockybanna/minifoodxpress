<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MiniFoodXpress | Restaurants</title>

<link rel="stylesheet" href="../shared/css/main.css">

<style>

body{
font-family:Arial, sans-serif;
margin:0;
background:#f5f5f5;
}

header{
background:#ff4d4f;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.search-bar{
padding:15px;
background:white;
}

.search-bar input{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

.restaurants{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
}

.restaurant-card{
background:white;
border-radius:8px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
cursor:pointer;
}

.restaurant-card img{
width:100%;
height:150px;
object-fit:cover;
}

.restaurant-info{
padding:12px;
}

.restaurant-info h3{
margin:0 0 5px 0;
}

.restaurant-info p{
margin:0;
color:#777;
font-size:14px;
}

</style>

</head>

<body>

<header>

<h2>MiniFoodXpress</h2>

<a href="profile.html" style="color:white;text-decoration:none">Profile</a>

</header>

<div class="search-bar">

<input id="searchInput" placeholder="Search restaurants">

</div>

<div id="restaurantList" class="restaurants">

<!-- restaurants will load here -->

</div>

<script type="module">

import { getRestaurants } from "../shared/js/api.js"

const container = document.getElementById("restaurantList")

async function loadRestaurants(){

const { data, error } = await getRestaurants()

if(error){

console.error(error)
return

}

container.innerHTML=""

data.forEach(r=>{

const card = document.createElement("div")

card.className="restaurant-card"

card.innerHTML = `

<img src="../assets/placeholders/restaurant.png">

<div class="restaurant-info">

<h3>${r.name}</h3>

<p>${r.cuisine || "Restaurant"}</p>

</div>

`

card.onclick = ()=>{

window.location.href = "restaurant-menu.html?id="+r.id

}

container.appendChild(card)

})

}

loadRestaurants()

</script>

</body>

</html>
