<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Restaurants | MiniFoodXpress</title>

<link rel="stylesheet" href="../shared/css/main.css">

<style>

body{
font-family:Arial,sans-serif;
margin:0;
background:#f5f5f5;
}

header{
background:#ff4d4f;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
padding:20px;
}

.restaurant-card{
background:white;
padding:20px;
margin-bottom:15px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

button{
padding:10px 15px;
border:none;
border-radius:4px;
cursor:pointer;
background:#007bff;
color:white;
margin-top:10px;
}

</style>

</head>

<body>

<header>

<h3>Restaurants</h3>

<a href="orders.html" style="color:white;text-decoration:none">My Orders</a>

</header>

<div class="container" id="restaurantList">

Loading restaurants...

</div>

<script type="module">

import { supabase } from "../shared/js/supabase-client.js"

const container = document.getElementById("restaurantList")

async function loadRestaurants(){

const { data, error } = await supabase
.from("restaurants")
.select("*")

if(error){
container.innerHTML="Error loading restaurants"
return
}

container.innerHTML=""

if(!data || data.length===0){
container.innerHTML="No restaurants available"
return
}

data.forEach(rest=>{

const div = document.createElement("div")

div.className="restaurant-card"

div.innerHTML = `

<h3>${rest.name}</h3>

<p>${rest.address || ""}</p>

<a href="restaurant.html?id=${rest.id}">

<button>View Menu</button>

</a>

`

container.appendChild(div)

})

}

loadRestaurants()

</script>

</body>

</html>
