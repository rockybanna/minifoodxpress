<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Your Cart | MiniFoodXpress</title>

<link rel="stylesheet" href="../shared/css/main.css">

<style>

body{
font-family:Arial, sans-serif;
margin:0;
background:#f5f5f5;
}

header{
background:#ff4d4f;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.cart-container{
padding:20px;
}

.cart-item{
background:white;
padding:15px;
margin-bottom:12px;
border-radius:8px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.cart-item h3{
margin:0;
}

button{
padding:6px 10px;
border:none;
background:#ff4d4f;
color:white;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#e63946;
}

.summary{
background:white;
padding:20px;
border-top:1px solid #eee;
position:fixed;
bottom:0;
left:0;
right:0;
display:flex;
justify-content:space-between;
align-items:center;
}

.checkout-btn{
padding:10px 15px;
background:#28a745;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<a href="home.html" style="color:white;text-decoration:none">← Back</a>

<h3>Your Cart</h3>

<span></span>

</header>

<div class="cart-container" id="cartItems">

</div>

<div class="summary">

<span id="totalAmount">₹0</span>

<button class="checkout-btn" id="checkoutBtn">Checkout</button>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart") || "[]")

const container = document.getElementById("cartItems")

function removeItem(index){

cart.splice(index,1)

localStorage.setItem("cart",JSON.stringify(cart))

loadCart()

}

function loadCart(){

container.innerHTML=""

let total=0

cart.forEach((item,index)=>{

total += Number(item.price)

const div=document.createElement("div")

div.className="cart-item"

div.innerHTML=`

<div>

<h3>${item.name}</h3>

<p>₹${item.price}</p>

</div>

<button>Remove</button>

`

div.querySelector("button").onclick=()=>removeItem(index)

container.appendChild(div)

})

document.getElementById("totalAmount").innerText="₹"+total

}

document.getElementById("checkoutBtn").onclick=()=>{

window.location.href="checkout.html"

}

loadCart()

</script>

</body>

</html>
