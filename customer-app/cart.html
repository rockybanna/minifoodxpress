<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cart | MiniFoodXpress</title>

<link rel="stylesheet" href="../shared/css/main.css">

<style>

body{
font-family:Arial,sans-serif;
margin:0;
background:#f5f5f5;
}

header{
background:#ff4d4f;
color:white;
padding:15px;
}

.container{
padding:20px;
}

.cart-item{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.total{
font-size:18px;
font-weight:bold;
margin-top:15px;
}

button{
padding:10px 15px;
border:none;
border-radius:4px;
cursor:pointer;
margin-top:10px;
background:#28a745;
color:white;
}

</style>

</head>

<body>

<header>

<a href="home.html" style="color:white;text-decoration:none">← Restaurants</a>

<h3>Your Cart</h3>

</header>

<div class="container" id="cartContainer">

Loading cart...

</div>

<script type="module">

import { supabase } from "../shared/js/supabase-client.js"

const container = document.getElementById("cartContainer")

let cart = JSON.parse(localStorage.getItem("cart") || "[]")

function renderCart(){

if(cart.length === 0){
container.innerHTML = "Cart is empty"
return
}

let total = 0

container.innerHTML = ""

cart.forEach(item => {

total += item.price * item.qty

const div = document.createElement("div")

div.className = "cart-item"

div.innerHTML = `

<h3>${item.name}</h3>

<p>₹${item.price} x ${item.qty}</p>

`

container.appendChild(div)

})

const totalDiv = document.createElement("div")

totalDiv.className = "total"

totalDiv.innerHTML = `

Total: ₹${total}

<br>

<button onclick="checkout(${total})">

Place Order

</button>

`

container.appendChild(totalDiv)

}

window.checkout = async function(total){

const { data:userData } = await supabase.auth.getUser()

if(!userData || !userData.user){
alert("Please login first")
return
}

const userId = userData.user.id

const { data, error } = await supabase
.from("orders")
.insert({
customer_id: userId,
total_amount: total,
status: "pending"
})
.select()
.single()

if(error){
alert("Order creation failed")
console.error(error)
return
}

const orderId = data.id

for(const item of cart){

await supabase
.from("order_items")
.insert({
order_id: orderId,
menu_item_id: item.id,
quantity: item.qty,
price: item.price
})

}

localStorage.removeItem("cart")

alert("Order placed successfully")

window.location.href = "orders.html"

}

renderCart()

</script>

</body>

</html>
