<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Menu Editor</title>

<link rel="stylesheet" href="../shared/css/main.css">

<style>

body{
font-family:Arial,sans-serif;
margin:0;
background:#f5f5f5;
}

header{
background:#007bff;
color:white;
padding:15px;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:15px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:8px;
margin-bottom:10px;
}

button{
padding:10px;
border:none;
border-radius:4px;
cursor:pointer;
background:#28a745;
color:white;
}

.item{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.delete{
background:#dc3545;
margin-left:10px;
}

</style>

</head>

<body>

<header>

<a href="restaurants.html" style="color:white;text-decoration:none">← Restaurants</a>

<h3>Menu Editor</h3>

</header>

<div class="container">

<div class="card">

<h3>Add Menu Item</h3>

<input id="itemName" placeholder="Item Name">

<select id="category"></select>

<input id="price" placeholder="Price">

<input id="imageUrl" placeholder="Image URL">

<button onclick="addItem()">Add Item</button>

</div>

<div id="menuList">
Loading menu...
</div>

</div>

<script type="module">

import { supabase } from "../shared/js/supabase-client.js"

const list = document.getElementById("menuList")
const categorySelect = document.getElementById("category")

const restaurantId = localStorage.getItem("menu_restaurant_id")

async function loadCategories(){

const { data } = await supabase
.from("menu_categories")
.select("*")

categorySelect.innerHTML=""

data.forEach(c=>{

const option=document.createElement("option")
option.value=c.id
option.innerText=c.name
categorySelect.appendChild(option)

})

}

async function loadMenu(){

const { data } = await supabase
.from("menu_items")
.select("*,menu_categories(name)")
.eq("restaurant_id",restaurantId)

list.innerHTML=""

if(!data || data.length===0){
list.innerHTML="No menu items"
return
}

data.forEach(item=>{

const div=document.createElement("div")
div.className="item"

div.innerHTML=`

<h3>${item.name}</h3>

<p>Category: ${item.menu_categories?.name || ""}</p>

<p>Price: ₹${item.price}</p>

<p>Status: ${item.is_available ? "Available" : "Disabled"}</p>

<button onclick="toggleAvailability('${item.id}',${item.is_available})">
Toggle Availability
</button>

<button onclick="editItem('${item.id}')">
Edit
</button>

<button class="delete" onclick="deleteItem('${item.id}')">
Delete
</button>

`

list.appendChild(div)

})

}

window.addItem = async function(){

const name=document.getElementById("itemName").value
const category=document.getElementById("category").value
const price=document.getElementById("price").value
const image=document.getElementById("imageUrl").value

await supabase
.from("menu_items")
.insert({
restaurant_id:restaurantId,
category_id:category,
name:name,
price:price,
image_url:image,
is_available:true
})

loadMenu()

}

window.deleteItem = async function(id){

if(!confirm("Delete item?")) return

await supabase
.from("menu_items")
.delete()
.eq("id",id)

loadMenu()

}

window.toggleAvailability = async function(id,current){

await supabase
.from("menu_items")
.update({
is_available:!current
})
.eq("id",id)

loadMenu()

}

window.editItem = function(id){

localStorage.setItem("menu_item_id",id)
window.location.href="item-editor.html"

}

loadCategories()
loadMenu()

</script>

</body>
</html>
