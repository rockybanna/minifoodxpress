<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payout Management</title>

<link rel="stylesheet" href="../shared/css/main.css">

<style>

body{
font-family:Arial,sans-serif;
margin:0;
background:#f5f5f5;
}

header{
background:#343a40;
color:white;
padding:15px;
}

.container{
padding:20px;
}

.section{
margin-bottom:40px;
}

.card{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

button{
padding:8px 12px;
border:none;
border-radius:4px;
cursor:pointer;
background:#28a745;
color:white;
}

</style>

</head>

<body>

<header>

<a href="dashboard.html" style="color:white;text-decoration:none">← Dashboard</a>

<h3>Payout Management</h3>

</header>

<div class="container">

<div class="section">

<h3>Restaurant Payouts</h3>

<div id="restaurantPayouts">
Loading...
</div>

</div>

<div class="section">

<h3>Driver Payouts</h3>

<div id="driverPayouts">
Loading...
</div>

</div>

</div>

<script type="module">

import { supabase } from "../shared/js/supabase-client.js"

const restaurantDiv = document.getElementById("restaurantPayouts")
const driverDiv = document.getElementById("driverPayouts")

async function loadRestaurantPayouts(){

const { data,error } = await supabase
.from("restaurant_settlements")
.select("*")
.eq("status","pending")

if(error){
restaurantDiv.innerHTML="Error loading restaurant payouts"
return
}

restaurantDiv.innerHTML=""

if(!data || data.length===0){
restaurantDiv.innerHTML="No pending restaurant payouts"
return
}

data.forEach(p=>{

const div=document.createElement("div")
div.className="card"

div.innerHTML=`

<p>Restaurant ID: ${p.restaurant_id}</p>

<p>Amount: ₹${p.amount}</p>

<button onclick="confirmRestaurantPayout('${p.id}')">
Mark Paid
</button>

`

restaurantDiv.appendChild(div)

})

}

async function loadDriverPayouts(){

const { data,error } = await supabase
.from("dp_settlements")
.select("*")
.eq("status","pending")

if(error){
driverDiv.innerHTML="Error loading driver payouts"
return
}

driverDiv.innerHTML=""

if(!data || data.length===0){
driverDiv.innerHTML="No pending driver payouts"
return
}

data.forEach(p=>{

const div=document.createElement("div")
div.className="card"

div.innerHTML=`

<p>Driver ID: ${p.driver_id}</p>

<p>Amount: ₹${p.amount}</p>

<button onclick="confirmDriverPayout('${p.id}')">
Mark Paid
</button>

`

driverDiv.appendChild(div)

})

}

window.confirmRestaurantPayout = async function(id){

await supabase
.from("restaurant_settlements")
.update({ status:"paid" })
.eq("id",id)

loadRestaurantPayouts()

}

window.confirmDriverPayout = async function(id){

await supabase
.from("dp_settlements")
.update({ status:"paid" })
.eq("id",id)

loadDriverPayouts()

}

loadRestaurantPayouts()
loadDriverPayouts()

</script>

</body>
</html>
