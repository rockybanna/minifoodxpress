<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Surge Control</title>

<link rel="stylesheet" href="../shared/css/main.css">

<style>

body{
font-family:Arial,sans-serif;
margin:0;
background:#f5f5f5;
}

header{
background:#343a40;
color:white;
padding:15px;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
max-width:400px;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
}

button{
padding:10px;
border:none;
background:#28a745;
color:white;
border-radius:4px;
cursor:pointer;
width:100%;
}

</style>

</head>

<body>

<header>

<a href="dashboard.html" style="color:white;text-decoration:none">← Dashboard</a>

<h3>Delivery Surge Control</h3>

</header>

<div class="container">

<div class="card">

<label>Surge Multiplier</label>

<input id="surge" type="number" step="0.1">

<button onclick="saveSurge()">Update Surge</button>

</div>

</div>

<script type="module">

import { supabase } from "../shared/js/supabase-client.js"

async function loadSettings(){

const { data } = await supabase
.from("system_settings")
.select("*")
.limit(1)
.single()

document.getElementById("surge").value =
data.delivery_surge_multiplier || 1

}

window.saveSurge = async function(){

const value = document.getElementById("surge").value

await supabase
.from("system_settings")
.update({
delivery_surge_multiplier:value
})
.eq("id",1)

alert("Surge updated")

}

loadSettings()

</script>

</body>
</html>
