<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verifier Dashboard</title>

<link rel="stylesheet" href="../shared/css/main.css">

<style>

body{
font-family:Arial,sans-serif;
margin:0;
background:#f5f5f5;
}

header{
background:#343a40;
color:white;
padding:15px;
}

.container{
padding:20px;
}

.card{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

button{
padding:8px 12px;
border:none;
border-radius:4px;
cursor:pointer;
margin-right:5px;
}

.approve{
background:#28a745;
color:white;
}

.reject{
background:#dc3545;
color:white;
}

</style>

</head>

<body>

<header>

<h3>Verifier Dashboard</h3>

</header>

<div class="container">

<h3>Pending Restaurant Approvals</h3>

<div id="restaurantList">
Loading restaurants...
</div>

</div>

<script type="module">

import { supabase } from "../shared/js/supabase-client.js"

const list=document.getElementById("restaurantList")

async function loadRestaurants(){

const { data,error } = await supabase
.from("restaurants")
.select("*")
.eq("status","pending")

if(error){
list.innerHTML="Error loading restaurants"
return
}

list.innerHTML=""

if(!data || data.length===0){
list.innerHTML="No pending restaurants"
return
}

data.forEach(r=>{

const div=document.createElement("div")
div.className="card"

div.innerHTML=`

<h3>${r.name}</h3>

<p>${r.address}</p>

<button class="approve" onclick="approveRestaurant('${r.id}')">
Approve
</button>

<button class="reject" onclick="rejectRestaurant('${r.id}')">
Reject
</button>

`

list.appendChild(div)

})

}

window.approveRestaurant = async function(id){

await supabase
.from("restaurants")
.update({ status:"active" })
.eq("id",id)

loadRestaurants()

}

window.rejectRestaurant = async function(id){

await supabase
.from("restaurants")
.update({ status:"rejected" })
.eq("id",id)

loadRestaurants()

}

loadRestaurants()

</script>

</body>
</html>
