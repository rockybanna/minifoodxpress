<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Refund Management</title>

<link rel="stylesheet" href="../shared/css/main.css">

<style>

body{
font-family:Arial,sans-serif;
margin:0;
background:#f5f5f5;
}

header{
background:#343a40;
color:white;
padding:15px;
}

.container{
padding:20px;
}

.card{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

button{
padding:8px 12px;
border:none;
border-radius:4px;
cursor:pointer;
margin-right:5px;
}

.approve{
background:#28a745;
color:white;
}

.reject{
background:#dc3545;
color:white;
}

</style>

</head>

<body>

<header>

<a href="dashboard.html" style="color:white;text-decoration:none">← Dashboard</a>

<h3>Refund Requests</h3>

</header>

<div class="container">

<div id="refundList">
Loading refunds...
</div>

</div>

<script type="module">

import { supabase } from "../shared/js/supabase-client.js"

const list=document.getElementById("refundList")

async function loadRefunds(){

const { data,error } = await supabase
.from("payments")
.select("*")
.eq("refund_status","requested")

if(error){
list.innerHTML="Error loading refunds"
return
}

list.innerHTML=""

if(!data || data.length===0){
list.innerHTML="No refund requests"
return
}

data.forEach(p=>{

const div=document.createElement("div")
div.className="card"

div.innerHTML=`

<h3>Refund ₹${p.amount}</h3>

<p>Order ID: ${p.order_id}</p>

<p>Payment Method: ${p.payment_method}</p>

<button class="approve" onclick="approveRefund('${p.id}')">
Approve Refund
</button>

<button class="reject" onclick="rejectRefund('${p.id}')">
Reject Refund
</button>

`

list.appendChild(div)

})

}

window.approveRefund = async function(id){

await supabase
.from("payments")
.update({ refund_status:"approved" })
.eq("id",id)

loadRefunds()

}

window.rejectRefund = async function(id){

await supabase
.from("payments")
.update({ refund_status:"rejected" })
.eq("id",id)

loadRefunds()

}

loadRefunds()

</script>

</body>
</html>
