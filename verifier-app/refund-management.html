<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Refund Management</title>

<link rel="stylesheet" href="../shared/css/main.css">

<style>
body{
  font-family:Arial,sans-serif;
  margin:0;
  background:#f5f5f5;
}
header{
  background:#343a40;
  color:white;
  padding:15px;
}
.container{
  padding:20px;
}
.card{
  background:white;
  padding:15px;
  margin-bottom:10px;
  border-radius:6px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
button{
  padding:8px 12px;
  border:none;
  border-radius:4px;
  cursor:pointer;
  margin-top:10px;
}
.approve{
  background:#28a745;
  color:white;
}
img{
  max-width:200px;
  display:block;
  margin:10px 0;
}
input{
  margin-top:10px;
}
</style>

</head>

<body>

<header>
<a href="dashboard.html" style="color:white;text-decoration:none">← Dashboard</a>
<h3>Refund Management</h3>
</header>

<div class="container">
<div id="refundList">Loading refunds...</div>
</div>

<script type="module">

import { supabase } from "../shared/js/supabase-client.js"
import { uploadRefundProof, markRefunded } from "../shared/js/api.js"

const list = document.getElementById("refundList")

// 🔥 LOAD REFUND PENDING PAYMENTS
async function loadRefunds(){

  const { data, error } = await supabase
    .from("payments")
    .select("*")
    .eq("verification_status", "rejected")
    .order("created_at", { ascending: false })

  if(error){
    list.innerHTML = "Error loading refunds"
    return
  }

  if(!data || data.length === 0){
    list.innerHTML = "No refund pending"
    return
  }

  list.innerHTML = ""

  data.forEach(p => {

    const div = document.createElement("div")
    div.className = "card"

    div.innerHTML = `
      <h3>Refund ₹${p.expected_amount}</h3>

      <p><b>Order:</b> ${p.order_id}</p>
      <p><b>Name:</b> ${p.payer_name}</p>
      <p><b>UPI:</b> ${p.payer_upi_id}</p>

      <p><b>Payment Proof:</b></p>
      <img src="${p.proof_image_url}" />

      <p><b>Upload Refund Proof:</b></p>
      <input type="file" id="file_${p.id}" />

      <button class="approve" onclick="processRefund('${p.id}', '${p.order_id}')">
        Mark Refunded
      </button>
    `

    list.appendChild(div)
  })
}

// 🚀 PROCESS REFUND
window.processRefund = async function(paymentId, orderId){

  const file = document.getElementById(`file_${paymentId}`).files[0]

  if(!file){
    alert("Upload refund proof")
    return
  }

  const { data:userData } = await supabase.auth.getUser()
  const verifierId = userData?.user?.id

  // 🔥 UPLOAD REFUND PROOF
  const { url, error:uploadError } = await uploadRefundProof(file, orderId)

  if(uploadError){
    alert(uploadError.message)
    return
  }

  // 🔥 MARK REFUNDED
  await markRefunded(paymentId, verifierId, url)

  // 🔥 UPDATE ORDER STATUS
  await supabase
    .from("orders")
    .update({ status: "refunded" })
    .eq("id", orderId)

  alert("Refund completed")

  loadRefunds()
}

loadRefunds()

</script>

</body>
</html>
