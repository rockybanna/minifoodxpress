<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Restaurant Login | MiniFoodXpress</title>

<link rel="stylesheet" href="../shared/css/main.css">

<style>

body{
font-family:Arial,sans-serif;
background:#f6f6f6;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.login-box{
background:white;
padding:30px;
width:350px;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.login-box h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-bottom:12px;
border:1px solid #ccc;
border-radius:4px;
}

button{
width:100%;
padding:12px;
background:#ff4d4f;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#e63946;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Restaurant Login</h2>

<input id="email" type="email" placeholder="Restaurant Email">

<input id="password" type="password" placeholder="Password">

<button id="loginBtn">Login</button>

</div>

<script type="module">

import { login } from "../shared/js/auth.js"

document.getElementById("loginBtn").onclick = async ()=>{

const email = document.getElementById("email").value
const password = document.getElementById("password").value

const user = await login(email,password)

if(user){

if(user.user_metadata.role !== "restaurant"){

alert("Not a restaurant account")
return

}

window.location.href="dashboard.html"

}

}

</script>

</body>

</html>
