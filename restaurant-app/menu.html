<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Restaurant Menu | MiniFoodXpress</title>

<link rel="stylesheet" href="../shared/css/main.css">

<style>

body{
font-family:Arial,sans-serif;
margin:0;
background:#f5f5f5;
}

header{
background:#ff4d4f;
color:white;
padding:15px;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:15px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:8px;
margin-bottom:10px;
}

button{
padding:10px;
border:none;
background:#007bff;
color:white;
border-radius:4px;
cursor:pointer;
}

.item{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.delete{
background:#dc3545;
margin-top:8px;
}

</style>

</head>

<body>

<header>

<a href="dashboard.html" style="color:white;text-decoration:none">← Dashboard</a>

<h3>Manage Menu</h3>

</header>

<div class="container">

<div class="card">

<h3>Add Menu Item</h3>

<input id="itemName" placeholder="Item Name">

<input id="itemPrice" placeholder="Price">

<button onclick="addItem()">Add Item</button>

</div>

<div id="menuList">

Loading menu...

</div>

</div>

<script type="module">

import { supabase } from "../shared/js/supabase-client.js"

const list = document.getElementById("menuList")

let restaurantId = null

async function getRestaurant(){

const { data:userData } = await supabase.auth.getUser()

const { data } = await supabase
.from("restaurants")
.select("*")
.eq("auth_user_id",userData.user.id)
.single()

restaurantId = data.id

loadMenu()

}

async function loadMenu(){

const { data, error } = await supabase
.from("menu_items")
.select("*")
.eq("restaurant_id",restaurantId)

if(error){
list.innerHTML="Error loading menu"
return
}

list.innerHTML=""

if(!data || data.length===0){
list.innerHTML="No menu items"
return
}

data.forEach(item=>{

const div=document.createElement("div")

div.className="item"

div.innerHTML=`

<h3>${item.name}</h3>

<p>₹${item.price}</p>

<button class="delete" onclick="deleteItem('${item.id}')">

Delete

</button>

`

list.appendChild(div)

})

}

window.addItem = async function(){

const name=document.getElementById("itemName").value
const price=document.getElementById("itemPrice").value

if(!name || !price){
alert("Enter name and price")
return
}

await supabase
.from("menu_items")
.insert({
name:name,
price:price,
restaurant_id:restaurantId
})

document.getElementById("itemName").value=""
document.getElementById("itemPrice").value=""

loadMenu()

}

window.deleteItem = async function(id){

if(!confirm("Delete item?")) return

await supabase
.from("menu_items")
.delete()
.eq("id",id)

loadMenu()

}

getRestaurant()

</script>

</body>

</html>
