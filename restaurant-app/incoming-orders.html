<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Incoming Orders | MiniFoodXpress</title>

<link rel="stylesheet" href="../shared/css/main.css">

<style>
body{
  font-family:Arial,sans-serif;
  margin:0;
  background:#f5f5f5;
}
header{
  background:#ff4d4f;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.container{
  padding:20px;
}
.order-card{
  background:white;
  padding:15px;
  margin-bottom:15px;
  border-radius:8px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}
.order-card h3{
  margin:0 0 8px 0;
}
.order-card p{
  margin:4px 0;
  font-size:14px;
}
.actions{
  margin-top:10px;
}
button{
  padding:6px 10px;
  border:none;
  color:white;
  border-radius:4px;
  cursor:pointer;
  margin-right:6px;
}
.accept{ background:#28a745; }
.reject{ background:#dc3545; }
</style>

</head>

<body>

<header>
<a href="dashboard.html" style="color:white;text-decoration:none">← Dashboard</a>
<h3>Incoming Orders</h3>
<span></span>
</header>

<div class="container" id="ordersContainer"></div>

<script type="module">

import { supabase } from "../shared/js/supabase-client.js"

const container = document.getElementById("ordersContainer")

// 🔥 LOAD VERIFIED ORDERS
async function loadOrders(){

  const { data, error } = await supabase
    .from("orders")
    .select("*")
    .eq("status", "verified")
    .order("created_at", { ascending: false })

  if(error){
    console.error(error)
    container.innerHTML = "<p>Error loading orders</p>"
    return
  }

  if(!data || data.length === 0){
    container.innerHTML = "<p>No new orders.</p>"
    return
  }

  container.innerHTML = ""

  data.forEach(order => {

    const div = document.createElement("div")
    div.className = "order-card"

    div.innerHTML = `
      <h3>Order #${order.id}</h3>

      <p><b>Total:</b> ₹${order.total_amount}</p>
      <p><b>Address:</b> ${order.address}</p>

      <p><b>Select Preparation Time:</b></p>
      <select id="prep_${order.id}">
        <option value="10">10 mins</option>
        <option value="15">15 mins</option>
        <option value="20">20 mins</option>
        <option value="25">25 mins</option>
        <option value="30">30 mins</option>
        <option value="35">35 mins</option>
        <option value="40">40 mins</option>
        <option value="45">45 mins</option>
      </select>

      <div class="actions">
        <button class="accept" onclick="acceptOrder('${order.id}')">
          Accept
        </button>

        <button class="reject" onclick="rejectOrder('${order.id}')">
          Reject
        </button>
      </div>
    `

    container.appendChild(div)
  })
}

// ✅ ACCEPT ORDER
window.acceptOrder = async function(orderId){

  const prepTime = parseInt(document.getElementById(`prep_${orderId}`).value)

  const now = new Date()
  const readyTime = new Date(now.getTime() + prepTime * 60000)

  await supabase
    .from("orders")
    .update({
      status: "preparing",
      prep_start_time: now.toISOString(),
      ready_at: readyTime.toISOString()
    })
    .eq("id", orderId)

  alert("Order accepted & preparing started")

  loadOrders()
}

// ❌ REJECT ORDER
window.rejectOrder = async function(orderId){

  await supabase
    .from("orders")
    .update({
      status: "cancelled",
      cancel_reason: "Rejected by restaurant"
    })
    .eq("id", orderId)

  alert("Order rejected")

  loadOrders()
}

loadOrders()

</script>

</body>
</html>
