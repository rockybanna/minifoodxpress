<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Order History | MiniFoodXpress</title>

<link rel="stylesheet" href="../shared/css/main.css">

<style>

body{
font-family:Arial,sans-serif;
margin:0;
background:#f5f5f5;
}

header{
background:#ff4d4f;
color:white;
padding:15px;
}

.container{
padding:20px;
}

.order{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.total{
font-weight:bold;
margin-top:5px;
}

</style>

</head>

<body>

<header>

<a href="dashboard.html" style="color:white;text-decoration:none">← Dashboard</a>

<h3>Completed Orders</h3>

</header>

<div class="container" id="ordersContainer">

Loading orders...

</div>

<script type="module">

import { supabase } from "../shared/js/supabase-client.js"

const container=document.getElementById("ordersContainer")

async function loadOrders(){

const { data:userData } = await supabase.auth.getUser()

if(!userData || !userData.user){
alert("Login required")
window.location.href="login.html"
return
}

const { data:restaurant } = await supabase
.from("restaurants")
.select("*")
.eq("auth_user_id",userData.user.id)
.single()

const { data, error } = await supabase
.from("orders")
.select("*")
.eq("restaurant_id",restaurant.id)
.eq("status","delivered")
.order("id",{ascending:false})

if(error){
container.innerHTML="Error loading orders"
return
}

container.innerHTML=""

if(!data || data.length===0){
container.innerHTML="No completed orders"
return
}

data.forEach(order=>{

const div=document.createElement("div")

div.className="order"

div.innerHTML=`

<h3>Order #${order.id}</h3>

<p>Total: ₹${order.total_amount}</p>

<p class="total">Delivered</p>

`

container.appendChild(div)

})

}

loadOrders()

</script>

</body>

</html>
