<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Restaurant Orders | MiniFoodXpress</title>

<link rel="stylesheet" href="../shared/css/main.css">

<style>

body{
font-family:Arial,sans-serif;
margin:0;
background:#f5f5f5;
}

header{
background:#ff4d4f;
color:white;
padding:15px;
}

.container{
padding:20px;
}

.order-card{
background:white;
padding:20px;
margin-bottom:15px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

button{
padding:8px 12px;
border:none;
border-radius:4px;
cursor:pointer;
margin-top:8px;
color:white;
}

.accept{
background:#007bff;
}

.ready{
background:#28a745;
}

</style>

</head>

<body>

<header>

<h3>Restaurant Orders</h3>

</header>

<div class="container" id="ordersContainer">

Loading orders...

</div>

<script type="module">

import { supabase } from "../shared/js/supabase-client.js"

const container = document.getElementById("ordersContainer")

async function loadOrders(){

const { data:userData } = await supabase.auth.getUser()

if(!userData || !userData.user){
container.innerHTML="Please login"
return
}

const authId = userData.user.id

const { data:restaurant } = await supabase
.from("restaurants")
.select("*")
.eq("auth_user_id",authId)
.single()

if(!restaurant){
container.innerHTML="Restaurant profile missing"
return
}

const restaurantId = restaurant.id

const { data, error } = await supabase
.from("orders")
.select("*")
.eq("restaurant_id",restaurantId)
.in("status",["pending","accepted"])

if(error){
container.innerHTML="Order loading error"
console.error(error)
return
}

container.innerHTML=""

if(!data || data.length===0){
container.innerHTML="No incoming orders"
return
}

data.forEach(order=>{

const div = document.createElement("div")

div.className="order-card"

div.innerHTML = `

<h3>Order #${order.id}</h3>

<p>Total ₹${order.total_amount}</p>

<p>Status: ${order.status}</p>

<button class="accept" onclick="acceptOrder('${order.id}')">

Accept Order

</button>

<button class="ready" onclick="markReady('${order.id}')">

Mark Ready

</button>

`

container.appendChild(div)

})

}

window.acceptOrder = async function(orderId){

await supabase
.from("orders")
.update({
status:"accepted"
})
.eq("id",orderId)

loadOrders()

}

window.markReady = async function(orderId){

await supabase
.from("orders")
.update({
status:"ready"
})
.eq("id",orderId)

alert("Order ready for pickup")

loadOrders()

}

loadOrders()

</script>

</body>

</html>
