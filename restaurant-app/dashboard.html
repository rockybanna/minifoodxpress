<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Restaurant Dashboard | MiniFoodXpress</title>

<link rel="stylesheet" href="../shared/css/main.css">

<style>

body{
font-family:Arial,sans-serif;
margin:0;
background:#f5f5f5;
}

header{
background:#ff4d4f;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:15px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

button{
padding:10px 15px;
border:none;
border-radius:4px;
cursor:pointer;
margin-top:10px;
background:#007bff;
color:white;
}

.stats{
display:flex;
gap:15px;
flex-wrap:wrap;
}

.stat-box{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
flex:1;
min-width:150px;
text-align:center;
}

.stat-box h2{
margin:0;
}

</style>

</head>

<body>

<header>

<h3>Restaurant Dashboard</h3>

<a href="orders.html" style="color:white;text-decoration:none">View Orders</a>

</header>

<div class="container">

<div class="stats">

<div class="stat-box">

<h2 id="todayOrders">0</h2>

<p>Today's Orders</p>

</div>

<div class="stat-box">

<h2 id="todayRevenue">₹0</h2>

<p>Today's Revenue</p>

</div>

</div>

<div class="card">

<h3>Incoming Orders</h3>

<p>Check and manage new customer orders.</p>

<a href="orders.html">

<button>Open Orders</button>

</a>

</div>

</div>

<script type="module">

import { supabase } from "../shared/js/supabase-client.js"

async function loadStats(){

const today = new Date().toISOString().split("T")[0]

const { data, error } = await supabase
.from("orders")
.select("*")
.gte("created_at", today)

if(error){
console.error(error)
return
}

let orderCount = 0
let revenue = 0

data.forEach(order=>{

orderCount++

revenue += Number(order.total_amount)

})

document.getElementById("todayOrders").innerText = orderCount
document.getElementById("todayRevenue").innerText = "₹"+revenue

}

loadStats()

</script>

</body>

</html>
