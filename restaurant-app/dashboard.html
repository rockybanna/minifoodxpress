<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Restaurant Dashboard | MiniFoodXpress</title>

<link rel="stylesheet" href="../shared/css/main.css">

<style>

body{
font-family:Arial,sans-serif;
margin:0;
background:#f5f5f5;
}

header{
background:#ff4d4f;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
padding:20px;
}

.order-card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.order-card h3{
margin:0 0 8px 0;
}

.order-card p{
margin:3px 0;
font-size:14px;
}

.actions{
margin-top:10px;
}

button{
padding:6px 10px;
border:none;
background:#28a745;
color:white;
border-radius:4px;
cursor:pointer;
margin-right:6px;
}

button.reject{
background:#dc3545;
}

</style>

</head>

<body>

<header>

<h3>Restaurant Dashboard</h3>

<a href="orders-history.html" style="color:white;text-decoration:none">Order History</a>

</header>

<div class="container" id="ordersContainer"></div>

<script type="module">

import { supabase } from "../shared/js/supabase-client.js"

const container = document.getElementById("ordersContainer")

async function loadOrders(){

const { data, error } = await supabase
.from("orders")
.select("*")
.eq("status","pending")

if(error){
console.error(error)
container.innerHTML="<p>Error loading orders</p>"
return
}

container.innerHTML=""

if(!data || data.length===0){
container.innerHTML="<p>No new orders.</p>"
return
}

data.forEach(order=>{

const div=document.createElement("div")
div.className="order-card"

div.innerHTML=`

<h3>Order #${order.id}</h3>

<p>Total: ₹${order.total_amount}</p>

<p>Address: ${order.address}</p>

<div class="actions">

<button class="accept">Accept</button>
<button class="reject">Reject</button>

</div>

`

div.querySelector(".accept").onclick = ()=>acceptOrder(order.id)
div.querySelector(".reject").onclick = ()=>rejectOrder(order.id)

container.appendChild(div)

})

}

async function acceptOrder(id){

const { error } = await supabase
.from("orders")
.update({status:"accepted"})
.eq("id",id)

if(error){
alert("Error accepting order")
console.error(error)
}

loadOrders()

}

async function rejectOrder(id){

const { error } = await supabase
.from("orders")
.update({status:"rejected"})
.eq("id",id)

if(error){
alert("Error rejecting order")
console.error(error)
}

loadOrders()

}

loadOrders()

</script>

</body>

</html>
