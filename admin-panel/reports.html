<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reports | MiniFoodXpress</title>

<link rel="stylesheet" href="../shared/css/main.css">

<style>

body{
font-family:Arial,sans-serif;
margin:0;
background:#f5f5f5;
}

header{
background:#343a40;
color:white;
padding:15px;
}

.container{
padding:20px;
}

.stats{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
flex:1;
min-width:200px;
text-align:center;
}

.card h2{
margin:0;
font-size:28px;
}

</style>

</head>

<body>

<header>

<a href="dashboard.html" style="color:white;text-decoration:none">← Dashboard</a>

<h3>Platform Reports</h3>

</header>

<div class="container">

<div class="stats">

<div class="card">
<h2 id="todayOrders">0</h2>
<p>Today's Orders</p>
</div>

<div class="card">
<h2 id="todayRevenue">₹0</h2>
<p>Today's Revenue</p>
</div>

<div class="card">
<h2 id="totalOrders">0</h2>
<p>Total Orders</p>
</div>

<div class="card">
<h2 id="totalRevenue">₹0</h2>
<p>Total Revenue</p>
</div>

</div>

</div>

<script type="module">

import { supabase } from "../shared/js/supabase-client.js"

async function loadReports(){

const today = new Date().toISOString().split("T")[0]

const { data:todayData } = await supabase
.from("orders")
.select("*")
.gte("created_at",today)

let todayOrders = 0
let todayRevenue = 0

todayData?.forEach(o=>{
todayOrders++
todayRevenue += Number(o.total_amount)
})

document.getElementById("todayOrders").innerText = todayOrders
document.getElementById("todayRevenue").innerText = "₹"+todayRevenue


const { data:allData } = await supabase
.from("orders")
.select("*")

let totalOrders = 0
let totalRevenue = 0

allData?.forEach(o=>{
totalOrders++
totalRevenue += Number(o.total_amount)
})

document.getElementById("totalOrders").innerText = totalOrders
document.getElementById("totalRevenue").innerText = "₹"+totalRevenue

}

loadReports()

</script>

</body>

</html>
