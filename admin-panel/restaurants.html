<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manage Restaurants | MiniFoodXpress</title>

<link rel="stylesheet" href="../shared/css/main.css">

<style>

body{
font-family:Arial,sans-serif;
margin:0;
background:#f5f5f5;
}

header{
background:#343a40;
color:white;
padding:15px;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:15px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:8px;
margin-bottom:10px;
}

button{
padding:8px 12px;
border:none;
border-radius:4px;
cursor:pointer;
background:#007bff;
color:white;
}

.restaurant{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<header>

<a href="dashboard.html" style="color:white;text-decoration:none">← Dashboard</a>

<h3>Manage Restaurants</h3>

</header>

<div class="container">

<div class="card">

<h3>Add Restaurant</h3>

<input id="name" placeholder="Restaurant Name">

<input id="address" placeholder="Address">

<button onclick="addRestaurant()">Add Restaurant</button>

</div>

<div id="restaurantList">

Loading restaurants...

</div>

</div>

<script type="module">

import { supabase } from "../shared/js/supabase-client.js"

const list = document.getElementById("restaurantList")

async function loadRestaurants(){

const { data, error } = await supabase
.from("restaurants")
.select("*")

if(error){
list.innerHTML="Error loading restaurants"
return
}

list.innerHTML=""

if(!data || data.length===0){
list.innerHTML="No restaurants added"
return
}

data.forEach(r=>{

const div=document.createElement("div")

div.className="restaurant"

div.innerHTML=`

<h3>${r.name}</h3>

<p>${r.address || ""}</p>

<button onclick="deleteRestaurant('${r.id}')">

Delete

</button>

`

list.appendChild(div)

})

}

window.addRestaurant = async function(){

const name=document.getElementById("name").value
const address=document.getElementById("address").value

if(!name){
alert("Enter restaurant name")
return
}

await supabase
.from("restaurants")
.insert({
name:name,
address:address
})

document.getElementById("name").value=""
document.getElementById("address").value=""

loadRestaurants()

}

window.deleteRestaurant = async function(id){

if(!confirm("Delete restaurant?")) return

await supabase
.from("restaurants")
.delete()
.eq("id",id)

loadRestaurants()

}

loadRestaurants()

</script>

</body>

</html>
