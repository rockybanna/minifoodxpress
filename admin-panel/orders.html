<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>All Orders | MiniFoodXpress</title>

<link rel="stylesheet" href="../shared/css/main.css">

<style>

body{
font-family:Arial,sans-serif;
margin:0;
background:#f5f5f5;
}

header{
background:#343a40;
color:white;
padding:15px;
}

.container{
padding:20px;
}

.order{
background:white;
padding:15px;
margin-bottom:12px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.status{
font-weight:bold;
margin-top:5px;
}

</style>

</head>

<body>

<header>

<a href="dashboard.html" style="color:white;text-decoration:none">← Dashboard</a>

<h3>All Orders</h3>

</header>

<div class="container" id="ordersContainer">

Loading orders...

</div>

<script type="module">

import { supabase } from "../shared/js/supabase-client.js"

const container = document.getElementById("ordersContainer")

async function loadOrders(){

const { data, error } = await supabase
.from("orders")
.select("*")
.order("id",{ascending:false})

if(error){
container.innerHTML="Error loading orders"
console.error(error)
return
}

container.innerHTML=""

if(!data || data.length===0){
container.innerHTML="No orders found"
return
}

data.forEach(order=>{

let statusText=""

if(order.status==="pending") statusText="Pending (Restaurant not accepted)"
if(order.status==="accepted") statusText="Restaurant preparing"
if(order.status==="ready") statusText="Waiting for driver"
if(order.status==="picked_up") statusText="Picked up"
if(order.status==="out_for_delivery") statusText="Out for delivery"
if(order.status==="delivered") statusText="Delivered"

const div=document.createElement("div")

div.className="order"

div.innerHTML=`

<h3>Order #${order.id}</h3>

<p>Total: ₹${order.total_amount}</p>

<p class="status">Status: ${statusText}</p>

<p>Restaurant ID: ${order.restaurant_id || "-"}</p>

<p>Customer ID: ${order.customer_id || "-"}</p>

<p>Driver ID: ${order.delivery_partner_id || "-"}</p>

`

container.appendChild(div)

})

}

loadOrders()

</script>

</body>

</html>
