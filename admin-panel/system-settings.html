<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>System Settings | MiniFoodXpress</title>

<link rel="stylesheet" href="../shared/css/main.css">

<style>

body{
font-family:Arial,sans-serif;
margin:0;
background:#f5f5f5;
}

header{
background:#ff4d4f;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav{
background:white;
padding:10px;
display:flex;
gap:15px;
border-bottom:1px solid #ddd;
}

nav a{
text-decoration:none;
color:#333;
font-weight:bold;
}

.container{
padding:20px;
max-width:600px;
margin:auto;
}

.section{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:12px;
border:1px solid #ccc;
border-radius:4px;
}

button{
padding:10px 15px;
background:#28a745;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<h3>System Settings</h3>

<a href="dashboard.html" style="color:white;text-decoration:none">Dashboard</a>

</header>

<nav>

<a href="restaurants.html">Restaurants</a> <a href="delivery-partners.html">Delivery Partners</a> <a href="orders.html">Orders</a> <a href="customers.html">Customers</a> <a href="reports.html">Reports</a> <a href="system-settings.html">Settings</a>

</nav>

<div class="container">

<div class="section">

<h4>Delivery Partner Rate (₹ per km)</h4>

<input id="dpRate" type="number" placeholder="Enter rate">

</div>

<div class="section">

<h4>Minimum Order Value (MOV)</h4>

<input id="mov" type="number" placeholder="Enter minimum order value">

</div>

<div class="section">

<h4>Maximum Order Limit</h4>

<input id="maxOrder" type="number" placeholder="Enter max order value">

</div>

<button id="saveSettings">Save Settings</button>

</div>

<script type="module">

import { supabase } from "../shared/js/supabase-client.js"

const saveBtn = document.getElementById("saveSettings")

saveBtn.onclick = async ()=>{

const dpRate = document.getElementById("dpRate").value
const mov = document.getElementById("mov").value
const maxOrder = document.getElementById("maxOrder").value

const { error } = await supabase
.from("system_settings")
.upsert({

id:1,
dp_rate:dpRate,
mov:mov,
max_order:maxOrder

})

if(error){
alert("Error saving settings")
console.error(error)
return
}

alert("Settings saved")

}

</script>

</body>

</html>
