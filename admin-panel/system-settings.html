<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>System Settings | MiniFoodXpress</title>

<link rel="stylesheet" href="../shared/css/main.css">

<style>

body{
font-family:Arial,sans-serif;
margin:0;
background:#f5f5f5;
}

header{
background:#343a40;
color:white;
padding:15px;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
max-width:400px;
}

input{
width:100%;
padding:8px;
margin-bottom:12px;
}

button{
padding:10px 15px;
border:none;
border-radius:4px;
cursor:pointer;
background:#007bff;
color:white;
}

</style>

</head>

<body>

<header>

<a href="dashboard.html" style="color:white;text-decoration:none">← Dashboard</a>

<h3>System Settings</h3>

</header>

<div class="container">

<div class="card">

<h3>Platform Settings</h3>

<label>Minimum Order Value</label>
<input id="mov">

<label>Delivery Charge Per KM</label>
<input id="deliveryCharge">

<button onclick="saveSettings()">Save Settings</button>

</div>

</div>

<script type="module">

import { supabase } from "../shared/js/supabase-client.js"

async function loadSettings(){

const { data } = await supabase
.from("system_settings")
.select("*")
.limit(1)
.maybeSingle()

if(!data) return

document.getElementById("mov").value = data.minimum_order_value || ""
document.getElementById("deliveryCharge").value = data.delivery_charge_km || ""

}

window.saveSettings = async function(){

const mov = document.getElementById("mov").value
const charge = document.getElementById("deliveryCharge").value

const { data } = await supabase
.from("system_settings")
.select("*")
.limit(1)
.maybeSingle()

if(data){

await supabase
.from("system_settings")
.update({
minimum_order_value: mov,
delivery_charge_km: charge
})
.eq("id",data.id)

}else{

await supabase
.from("system_settings")
.insert({
minimum_order_value: mov,
delivery_charge_km: charge
})

}

alert("Settings saved")

}

loadSettings()

</script>

</body>

</html>
