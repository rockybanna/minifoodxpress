<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard | MiniFoodXpress</title>

<link rel="stylesheet" href="../shared/css/main.css">

<style>

body{
font-family:Arial,sans-serif;
margin:0;
background:#f5f5f5;
}

header{
background:#343a40;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
padding:20px;
}

.stats{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.stat-card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
flex:1;
min-width:200px;
text-align:center;
}

.stat-card h2{
margin:0;
font-size:28px;
}

.menu{
margin-top:20px;
}

.menu a{
display:block;
background:white;
padding:15px;
margin-bottom:10px;
border-radius:6px;
text-decoration:none;
color:black;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<header>

<h2>Admin Dashboard</h2>

<a href="login.html" style="color:white;text-decoration:none">Logout</a>

</header>

<div class="container">

<div class="stats">

<div class="stat-card">
<h2 id="restaurantsCount">0</h2>
<p>Restaurants</p>
</div>

<div class="stat-card">
<h2 id="driversCount">0</h2>
<p>Delivery Partners</p>
</div>

<div class="stat-card">
<h2 id="ordersCount">0</h2>
<p>Total Orders</p>
</div>

<div class="stat-card">
<h2 id="customersCount">0</h2>
<p>Customers</p>
</div>

</div>

<div class="menu">

<a href="restaurants.html">Manage Restaurants</a>

<a href="delivery-partners.html">Manage Delivery Partners</a>

<a href="customers.html">Manage Customers</a>

<a href="orders.html">View Orders</a>

<a href="reports.html">Reports</a>

<a href="system-settings.html">System Settings</a>

</div>

</div>

<script type="module">

import { supabase } from "../shared/js/supabase-client.js"

async function loadStats(){

const { count:restaurantCount } = await supabase
.from("restaurants")
.select("*",{count:"exact",head:true})

const { count:driverCount } = await supabase
.from("delivery_partners")
.select("*",{count:"exact",head:true})

const { count:orderCount } = await supabase
.from("orders")
.select("*",{count:"exact",head:true})

const { count:customerCount } = await supabase
.from("customers")
.select("*",{count:"exact",head:true})

document.getElementById("restaurantsCount").innerText = restaurantCount || 0
document.getElementById("driversCount").innerText = driverCount || 0
document.getElementById("ordersCount").innerText = orderCount || 0
document.getElementById("customersCount").innerText = customerCount || 0

}

loadStats()

</script>

</body>

</html>
