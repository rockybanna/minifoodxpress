<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard | MiniFoodXpress</title>

<link rel="stylesheet" href="../shared/css/main.css">

<style>

body{
font-family:Arial,sans-serif;
margin:0;
background:#f5f5f5;
}

header{
background:#ff4d4f;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav{
background:white;
padding:10px;
display:flex;
gap:15px;
border-bottom:1px solid #ddd;
}

nav a{
text-decoration:none;
color:#333;
font-weight:bold;
}

.container{
padding:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
text-align:center;
}

.card h2{
margin:10px 0;
}

</style>

</head>

<body>

<header>

<h3>Admin Dashboard</h3>

<a href="login.html" style="color:white;text-decoration:none">Logout</a>

</header>

<nav>

<a href="restaurants.html">Restaurants</a> <a href="delivery-partners.html">Delivery Partners</a> <a href="orders.html">Orders</a> <a href="customers.html">Customers</a> <a href="reports.html">Reports</a> <a href="system-settings.html">Settings</a>

</nav>

<div class="container">

<div class="cards">

<div class="card">
<p>Total Orders</p>
<h2 id="ordersCount">0</h2>
</div>

<div class="card">
<p>Restaurants</p>
<h2 id="restaurantsCount">0</h2>
</div>

<div class="card">
<p>Delivery Partners</p>
<h2 id="driversCount">0</h2>
</div>

<div class="card">
<p>Customers</p>
<h2 id="customersCount">0</h2>
</div>

</div>

</div>

<script type="module">

import { supabase } from "../shared/js/supabase-client.js"

async function loadStats(){

const orders = await supabase.from("orders").select("*",{count:"exact"})
const restaurants = await supabase.from("restaurants").select("*",{count:"exact"})
const drivers = await supabase.from("delivery_partners").select("*",{count:"exact"})
const customers = await supabase.from("customers").select("*",{count:"exact"})

document.getElementById("ordersCount").innerText = orders.count || 0
document.getElementById("restaurantsCount").innerText = restaurants.count || 0
document.getElementById("driversCount").innerText = drivers.count || 0
document.getElementById("customersCount").innerText = customers.count || 0

}

loadStats()

</script>

</body>

</html>
