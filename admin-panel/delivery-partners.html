<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Delivery Partners | MiniFoodXpress</title>

<link rel="stylesheet" href="../shared/css/main.css">

<style>

body{
font-family:Arial,sans-serif;
margin:0;
background:#f5f5f5;
}

header{
background:#343a40;
color:white;
padding:15px;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:15px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:8px;
margin-bottom:10px;
}

button{
padding:8px 12px;
border:none;
border-radius:4px;
cursor:pointer;
background:#007bff;
color:white;
}

.driver{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.status{
font-weight:bold;
margin-top:5px;
}

</style>

</head>

<body>

<header>

<a href="dashboard.html" style="color:white;text-decoration:none">← Dashboard</a>

<h3>Delivery Partners</h3>

</header>

<div class="container">

<div class="card">

<h3>Add Delivery Partner</h3>

<input id="name" placeholder="Driver Name">

<input id="phone" placeholder="Phone Number">

<button onclick="addDriver()">Add Driver</button>

</div>

<div id="driverList">

Loading drivers...

</div>

</div>

<script type="module">

import { supabase } from "../shared/js/supabase-client.js"

const list=document.getElementById("driverList")

async function loadDrivers(){

const { data, error } = await supabase
.from("delivery_partners")
.select("*")

if(error){
list.innerHTML="Error loading drivers"
return
}

list.innerHTML=""

if(!data || data.length===0){
list.innerHTML="No drivers added"
return
}

data.forEach(d=>{

const div=document.createElement("div")

div.className="driver"

div.innerHTML=`

<h3>${d.name}</h3>

<p>${d.phone || ""}</p>

<p class="status">Status: ${d.status}</p>

<button onclick="deleteDriver('${d.id}')">

Delete

</button>

`

list.appendChild(div)

})

}

window.addDriver = async function(){

const name=document.getElementById("name").value
const phone=document.getElementById("phone").value

if(!name){
alert("Enter driver name")
return
}

await supabase
.from("delivery_partners")
.insert({
name:name,
phone:phone,
status:"offline"
})

document.getElementById("name").value=""
document.getElementById("phone").value=""

loadDrivers()

}

window.deleteDriver = async function(id){

if(!confirm("Delete driver?")) return

await supabase
.from("delivery_partners")
.delete()
.eq("id",id)

loadDrivers()

}

loadDrivers()

</script>

</body>

</html>
