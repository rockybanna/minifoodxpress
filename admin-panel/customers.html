<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Customers | MiniFoodXpress</title>

<link rel="stylesheet" href="../shared/css/main.css">

<style>

body{
font-family:Arial,sans-serif;
margin:0;
background:#f5f5f5;
}

header{
background:#343a40;
color:white;
padding:15px;
}

.container{
padding:20px;
}

.customer{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

button{
padding:8px 12px;
border:none;
border-radius:4px;
cursor:pointer;
background:#dc3545;
color:white;
margin-top:8px;
}

</style>

</head>

<body>

<header>

<a href="dashboard.html" style="color:white;text-decoration:none">← Dashboard</a>

<h3>Customers</h3>

</header>

<div class="container" id="customerList">

Loading customers...

</div>

<script type="module">

import { supabase } from "../shared/js/supabase-client.js"

const container=document.getElementById("customerList")

async function loadCustomers(){

const { data, error } = await supabase
.from("customers")
.select("*")

if(error){
container.innerHTML="Error loading customers"
return
}

container.innerHTML=""

if(!data || data.length===0){
container.innerHTML="No customers found"
return
}

data.forEach(c=>{

const div=document.createElement("div")

div.className="customer"

div.innerHTML=`

<h3>${c.name || "Customer"}</h3>

<p>${c.phone || ""}</p>

<button onclick="deleteCustomer('${c.id}')">

Delete Customer

</button>

`

container.appendChild(div)

})

}

window.deleteCustomer = async function(id){

if(!confirm("Delete customer?")) return

await supabase
.from("customers")
.delete()
.eq("id",id)

loadCustomers()

}

loadCustomers()

</script>

</body>

</html>
