<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Deliver Order | MiniFoodXpress</title>

<link rel="stylesheet" href="../shared/css/main.css">

<style>

body{
font-family:Arial,sans-serif;
margin:0;
background:#f5f5f5;
}

header{
background:#ff4d4f;
color:white;
padding:15px;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

button{
padding:10px 15px;
border:none;
border-radius:4px;
cursor:pointer;
margin-top:10px;
color:white;
}

.complete{
background:#28a745;
}

</style>

</head>

<body>

<header>

<a href="dashboard.html" style="color:white;text-decoration:none">← Dashboard</a>

<h3>Complete Delivery</h3>

</header>

<div class="container">

<div class="card" id="orderDetails">

Loading order...

</div>

</div>

<script type="module">

import { supabase } from "../shared/js/supabase-client.js"

const params = new URLSearchParams(window.location.search)
const orderId = params.get("id")

const container = document.getElementById("orderDetails")

let orderData = null

async function loadOrder(){

const { data, error } = await supabase
.from("orders")
.select("*")
.eq("id",orderId)
.single()

if(error){
container.innerHTML="Order load error"
return
}

orderData = data

container.innerHTML = `

<h3>Order #${data.id}</h3>

<p>Total: ₹${data.total_amount}</p>

<p>Delivery Address: ${data.address}</p>

<button class="complete" onclick="completeDelivery()">

Confirm Delivery

</button>

`

}

window.completeDelivery = async function(){

await supabase
.from("orders")
.update({
status:"delivered"
})
.eq("id",orderId)

alert("Delivery completed")

window.location.href="history.html"

}

loadOrder()

</script>

</body>

</html>
