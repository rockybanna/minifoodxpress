<!DOCTYPE html>
<html>
<head>

<title>Driver Dashboard</title>
<link rel="stylesheet" href="../shared/css/main.css">

</head>

<body>

<h2>Driver Dashboard</h2>

<button id="toggleBtn">Loading...</button>

<div id="orders"></div>

<script type="module">

import { supabase } from "../shared/js/supabase-client.js"

let driverId = null
let isOnline = false

const toggleBtn = document.getElementById("toggleBtn")
const ordersDiv = document.getElementById("orders")

async function init(){

const { data } = await supabase.auth.getUser()

if(!data.user){
location.href="login.html"
return
}

const authId = data.user.id

const { data:driver } = await supabase
.from("delivery_partners")
.select("*")
.eq("auth_user_id",authId)
.maybeSingle()

if(!driver){
ordersDiv.innerHTML="Driver profile missing"
return
}

driverId = driver.id
isOnline = driver.status === "active"

updateButton()

if(isOnline){
loadOrders()
}

}

toggleBtn.onclick = async ()=>{

if(!driverId) return

isOnline = !isOnline

await supabase
.from("delivery_partners")
.update({
status:isOnline ? "active":"offline"
})
.eq("id",driverId)

updateButton()

if(isOnline){
loadOrders()
}else{
ordersDiv.innerHTML="You are offline"
}

}

function updateButton(){

toggleBtn.innerText = isOnline ? "Go Offline" : "Go Online"

}

async function loadOrders(){

const { data } = await supabase
.from("orders")
.select("*")
.eq("status","ready")

ordersDiv.innerHTML=""

if(!data || data.length===0){
ordersDiv.innerHTML="No orders available"
return
}

data.forEach(order=>{

const div = document.createElement("div")

div.innerHTML = `
<h3>Order #${order.id}</h3>
<p>Total ₹${order.total_amount}</p>

<a href="orders.html?id=${order.id}">
<button>View</button>
</a>
`

ordersDiv.appendChild(div)

})

}

init()

</script>

</body>
</html>
