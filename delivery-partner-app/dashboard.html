<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Driver Dashboard | MiniFoodXpress</title>

<link rel="stylesheet" href="../shared/css/main.css">

<style>

body{
font-family:Arial,sans-serif;
margin:0;
background:#f5f5f5;
}

header{
background:#ff4d4f;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
padding:20px;
}

.order-card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

button{
padding:8px 12px;
border:none;
border-radius:4px;
cursor:pointer;
color:white;
margin-top:8px;
}

.online{
background:#28a745;
}

.offline{
background:#dc3545;
}

.accept{
background:#007bff;
}

</style>

</head>

<body>

<header>

<h3>Driver Dashboard</h3>

<button id="toggleBtn">Loading...</button>

</header>

<div class="container" id="orders"></div>

<script type="module">

import { supabase } from "../shared/js/supabase-client.js"

let driverId = null
let isOnline = false

const toggleBtn = document.getElementById("toggleBtn")
const ordersDiv = document.getElementById("orders")

async function init(){

const { data:userData } = await supabase.auth.getUser()

if(!userData || !userData.user){
location.href="login.html"
return
}

const authId = userData.user.id

const { data:driver } = await supabase
.from("delivery_partners")
.select("*")
.eq("auth_user_id", authId)
.maybeSingle()

if(!driver){
ordersDiv.innerHTML="Driver profile missing"
return
}

driverId = driver.id
isOnline = driver.status === "active"

updateButton()

if(isOnline){
loadOrders()
}else{
ordersDiv.innerHTML="You are offline"
}

listenRealtime()

}

toggleBtn.onclick = async ()=>{

if(!driverId) return

isOnline = !isOnline

await supabase
.from("delivery_partners")
.update({
status: isOnline ? "active":"offline"
})
.eq("id",driverId)

updateButton()

if(isOnline){
loadOrders()
}else{
ordersDiv.innerHTML="You are offline"
}

}

function updateButton(){

if(isOnline){

toggleBtn.innerText="Go Offline"
toggleBtn.className="online"

}else{

toggleBtn.innerText="Go Online"
toggleBtn.className="offline"

}

}

async function loadOrders(){

const { data, error } = await supabase
.from("orders")
.select("*")
.eq("status","ready")
.is("delivery_partner_id",null)

if(error){
console.error(error)
ordersDiv.innerHTML="Order loading error"
return
}

ordersDiv.innerHTML=""

if(!data || data.length===0){
ordersDiv.innerHTML="No orders available"
return
}

data.forEach(order=>{

const div=document.createElement("div")

div.className="order-card"

div.innerHTML = `

<h3>Order #${order.id}</h3>

<p>Total: ₹${order.total_amount}</p>

<p>Address: ${order.address}</p>

<a href="pickup-order.html?id=${order.id}">
<button class="accept">Accept Order</button>
</a>

`

ordersDiv.appendChild(div)

})

}

function listenRealtime(){

supabase
.channel("orders-channel")
.on(
"postgres_changes",
{
event: "*",
schema: "public",
table: "orders"
},
(payload)=>{

if(payload.new.status === "ready"){
loadOrders()
}

}
)
.subscribe()

}

init()

</script>

</body>

</html>
