<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pickup Order | MiniFoodXpress</title>

<link rel="stylesheet" href="../shared/css/main.css">

<style>

body{
font-family:Arial,sans-serif;
margin:0;
background:#f5f5f5;
}

header{
background:#ff4d4f;
color:white;
padding:15px;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

button{
padding:10px 15px;
border:none;
border-radius:4px;
cursor:pointer;
margin-top:10px;
}

.pickup{
background:#28a745;
color:white;
}

.navigate{
background:#007bff;
color:white;
}

</style>

</head>

<body>

<header>

<a href="dashboard.html" style="color:white;text-decoration:none">← Dashboard</a>

<h3>Pickup Order</h3>

</header>

<div class="container">

<div class="card" id="orderDetails">

Loading order...

</div>

</div>

<script type="module">

import { supabase } from "../shared/js/supabase-client.js"

const params = new URLSearchParams(window.location.search)
const orderId = params.get("id")

const container = document.getElementById("orderDetails")

let orderData = null

async function loadOrder(){

const { data, error } = await supabase
.from("orders")
.select("*")
.eq("id",orderId)
.single()

if(error){
container.innerHTML="Order load error"
return
}

orderData = data

container.innerHTML = `

<h3>Order #${data.id}</h3>

<p>Total: ₹${data.total_amount}</p>

<p>Address: ${data.address}</p>

<button class="pickup" onclick="acceptOrder()">Confirm Pickup</button>

<a href="navigate-restaurant.html?id=${data.id}">
<button class="navigate">Navigate to Restaurant</button>
</a>

`

}

window.acceptOrder = async function(){

const { data:userData } = await supabase.auth.getUser()

const authId = userData.user.id

const { data:driver } = await supabase
.from("delivery_partners")
.select("*")
.eq("auth_user_id",authId)
.single()

await supabase
.from("orders")
.update({
delivery_partner_id: driver.id,
status: "picked_up"
})
.eq("id",orderId)

alert("Order picked successfully")

window.location.href="navigate-restaurant.html?id="+orderId

}

loadOrder()

</script>

</body>

</html>
